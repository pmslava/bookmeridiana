<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenis Kosmos — Rezervacija terena</title>
  <meta name="description" content="Rezervišite teniski teren u Novom Sadu — Tenis Kosmos">
  <meta name="theme-color" content="#0a0a0a">
  <!-- Favicon: tennis ball -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23c5e84c'/><path d='M 22 15 Q 50 50, 22 85' stroke='white' stroke-width='4' fill='none' opacity='.7'/><path d='M 78 15 Q 50 50, 78 85' stroke='white' stroke-width='4' fill='none' opacity='.7'/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Language switcher -->
  <div class="lang-switcher" id="lang-switcher"></div>

  <!-- Hero -->
  <header class="hero">
    <!-- Background: faint court diagram -->
    <svg class="hero-court-bg" width="600" height="300" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="200" height="100" rx="4" fill="#c66c4d"/>
      <rect x="10" y="5" width="180" height="90" fill="none" stroke="white" stroke-width="1.5"/>
      <line x1="100" y1="5" x2="100" y2="95" stroke="white" stroke-width="1.5"/>
      <rect x="40" y="5" width="120" height="90" fill="none" stroke="white" stroke-width="1"/>
      <line x1="40" y1="50" x2="160" y2="50" stroke="white" stroke-width="1"/>
    </svg>

    <!-- Floating tennis ball accent -->
    <svg class="hero-ball" width="64" height="64" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#c5e84c"/>
      <path d="M 22 15 Q 50 50, 22 85" stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
      <path d="M 78 15 Q 50 50, 78 85" stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
    </svg>

    <h1><span class="accent">Tenis</span> Kosmos</h1>
    <p class="tagline">Rezervišite teren ili trening</p>
  </header>

  <!-- Booking app mount point -->
  <main class="main-container">
    <div id="booking-app">
      <!-- Rendered by app.js -->
    </div>
  </main>

  <!-- Tennis ball divider -->
  <div class="ball-divider">
    <svg width="24" height="24" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#c5e84c"/>
      <path d="M 22 15 Q 50 50, 22 85" stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
      <path d="M 78 15 Q 50 50, 78 85" stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
    </svg>
  </div>

  <!-- Footer (populated from config.json by app.js) -->
  <footer class="footer" id="site-footer"></footer>

  <script src="app.js"></script>
</body>
</html>
